# switchboard.config.example.yaml
# One governed MCP endpoint for every app your agents touch.
#
# Copy this to `switchboard.config.yaml` (or run `switchboard init`), edit it,
# store secrets with `switchboard vault set <name>`, then `switchboard serve`.
# The dashboard reads and writes this file; you can also hand-edit it.

gateway:
  # How agents connect TO Switchboard. Run both at once if you like.
  #   stdio -> for `claude mcp add` / Cursor / local MCP clients
  #   http  -> Streamable HTTP endpoint at /mcp + the web dashboard
  transport: [stdio, http]
  http:
    host: 127.0.0.1        # local-first: bound to loopback, not the network
    port: 8088
    # Whether /mcp demands a bearer API key (issue one with `switchboard apikey new <name>`,
    # then pass it as `Authorization: Bearer <token>` or the `x-api-key` header):
    #   auto   -> require iff host is NOT loopback (default). Zero friction on localhost;
    #             fails closed the instant you bind to the network or front it with a tunnel.
    #   always -> require even on localhost (defense in depth on a shared machine)
    #   never  -> serve unauthenticated (only safe behind another gate you control)
    require_auth: auto
  # How upstream tools are presented to agents:
  #   namespaced -> serverId__toolName (collision-free, the safe default)
  #   flat       -> bare toolName (first server to claim a name wins)
  #   search     -> expose just two meta-tools (find_tools + call_tool) so the
  #                 context window stays flat no matter how many servers you mount
  tool_exposure: namespaced
  default_policy: read     # read | write | full  (least privilege by default)

vault:
  # encrypted-file -> AES-256-GCM blob in ~/.switchboard (portable, zero native deps)
  # env            -> read secrets from the process environment only (CI / containers)
  backend: encrypted-file

# Dashboard-managed presentation + integrations. Every field here is optional and is
# round-tripped by the Settings pages in the web dashboard — hand-edit or click, either works.
settings:
  general:
    organization_name: Local      # shown in the dashboard header; cosmetic only
    project_name: default

  # Branding for the OAuth callback page users land on after connecting a provider.
  auth_screen:
    title: Connected
    subtitle: You can close this tab and return to your agent.
    logo_url: ""                  # absolute https URL, or leave blank for the default mark
    accent_color: "#2dd4bf"
    support_url: ""

  # Forward policy decisions to an external URL. When `secret_ref` names a vault secret,
  # each delivery carries an HMAC-SHA256 `x-switchboard-signature` header so the receiver
  # can verify it came from you. Without a secret, payloads are sent unsigned.
  webhook:
    enabled: false
    url: ""                       # e.g. https://example.com/hooks/switchboard
    events: [deny, approval_required]   # any of: allow | deny | approval_required (empty = all)
    secret_ref: ""                # ${vault:name} ref, e.g. ${vault:webhook_secret} (set via `switchboard vault set webhook_secret`)

  # Audit-capture controls (the Logs page). Duration is always recorded; this only
  # governs whether the request args + upstream response are stored too.
  logs:
    # When true, allowed executions also record (redacted, size-capped to 4 KB) request
    # arguments and upstream responses. Secret-looking keys are masked before write.
    # Off by default — turn it on only when you need to inspect tool I/O.
    capture_io: false

  # Cross-provider "council" relay tools. Lets an agent connected to Switchboard broker a
  # PEER model: council_consult (one prompt -> the other provider) and council_debate (a
  # bounded multi-round exchange between providers + a synthesized conclusion). The headline
  # use case: a Claude client asking OpenAI for a second opinion, or vice-versa.
  #
  # These tools are OUTBOUND + metered, so the whole feature is OFF by default. They mount as
  # a synthetic in-process MCP server and flow through the SAME policy -> approval -> audit
  # path as any upstream tool (both are `write`-scoped). Store the keys first:
  #   switchboard vault set anthropic_api_key
  #   switchboard vault set openai_api_key
  # API keys MUST be ${vault:..}/${env:..} references — a literal key fails config validation.
  council:
    enabled: false
    max_rounds: 3            # hard ceiling on council_debate rounds (loop guard, max 10)
    token_budget: 2048       # max_tokens cap applied to every provider call (cost guard)
    require_approval: false  # true -> every council call needs a human confirm
    providers:               # council_debate needs at least two configured
      anthropic:
        api_key_ref: ${vault:anthropic_api_key}
        default_model: claude-opus-4-8   # per-call `model` arg overrides this; nothing hardcoded
        # base_url: https://api.anthropic.com   # override for a proxy / gateway
      openai:
        api_key_ref: ${vault:openai_api_key}
        default_model: gpt-4o
        # base_url: https://api.openai.com

  # Built-in OAuth 2.1 + PKCE Authorization Server for the `/mcp` endpoint. Turn this ON only
  # to connect a hosted MCP client that can reach Switchboard ONLY through a public HTTPS
  # tunnel and refuses a static bearer token — notably claude.ai web, which requires OAuth 2.1
  # + PKCE + Dynamic Client Registration. Claude Desktop, Claude Code, and ChatGPT dev-mode all
  # reach a local endpoint with a plain API key instead, so they do NOT need this.
  #
  # How it works: enabling this turns the dashboard's own `/mcp` into an OAuth Resource Server.
  # The SDK router publishes RFC 8414 AS metadata + RFC 9728 protected-resource metadata at
  # `/.well-known/*`, accepts RFC 7591 dynamic client registration at `/register`, and runs the
  # mandatory-PKCE authorize -> consent -> token flow. Tokens are opaque (looked up server-side,
  # never JWTs), persisted SEALED with your vault key, and additionally stored one-way hashed.
  # `/mcp` then accepts EITHER a local API key OR a valid OAuth token. Enabling it also FORCES
  # `/mcp` authentication on (fail-closed) — a public issuer implies the endpoint is exposed.
  #
  # `public_url` is REQUIRED when enabled and MUST be the public HTTPS origin your tunnel serves
  # (the loopback address cannot be the issuer for a cloud client). Start a tunnel first, e.g.
  # `switchboard expose`, then paste its URL here. The canonical token audience is `<public_url>/mcp`.
  oauth_server:
    enabled: false
    public_url: ""                  # e.g. https://abc123.trycloudflare.com  (REQUIRED when enabled)
    access_token_ttl: 3600          # access-token lifetime in seconds (default 1h)
    refresh_token_ttl: 1209600      # refresh-token lifetime in seconds (default 14d; 0 disables refresh)
    consent: true                   # show the human approval screen on every authorization (governance-first)

servers:
  # --- mount an existing MCP server from npm ---
  - id: github
    source: npx
    package: "@modelcontextprotocol/server-github"
    enabled: true
    policy: write                       # this app may read + write, but not "full"
    credentials:
      GITHUB_TOKEN: ${vault:github_pat}  # resolved from the local vault at mount time
    tools:                              # per-tool overrides (optional)
      delete_repo:  { enabled: false }  # hard-block the destructive one
      create_issue: { policy: write }
      get_repo:     { policy: read }

  # --- a read-only server ---
  - id: notion
    source: npx
    package: "@notionhq/notion-mcp-server"
    enabled: true
    policy: read
    credentials:
      NOTION_TOKEN: ${vault:notion}

  # --- a remote (hosted) MCP server, toggled OFF until you wire its auth ---
  - id: slack
    source: remote
    url: https://example-slack-mcp.invalid/mcp
    enabled: false
    auth: oauth

  # --- the bundled test server: real, no credentials, great for a first run ---
  - id: everything
    source: npx
    package: "@modelcontextprotocol/server-everything"
    enabled: true
    policy: read
    approval:
      require_for: [write, full]        # human approval gate on mutating calls

  # --- app2mcp: generate an MCP server in-process from your own OpenAPI/Swagger spec (Phase 4, shipped) ---
  # `openapi` takes a local file path OR an http(s) URL. Each operation becomes a governed tool;
  # scope is inferred from the HTTP verb (GET->read, POST/PUT/PATCH->write, DELETE->full).
  # Disabled here only because `./specs/internal.yaml` doesn't exist in this repo — point it at a
  # real spec and flip `enabled: true`. A reference without a resolvable spec still fails closed.
  - id: internal-api
    source: app2mcp
    openapi: ./specs/internal.yaml          # or e.g. https://petstore3.swagger.io/api/v3/openapi.json
    base_url: https://api.internal.example.com  # override for relative / host-less specs
    enabled: false
    policy: read                            # ceiling: GET tools allowed, generated DELETE denied
    credentials:
      Authorization: ${vault:internal_api_token}  # resolved per call from the vault
    approval:
      require_for: [write, full]
